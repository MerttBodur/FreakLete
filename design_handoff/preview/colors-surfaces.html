<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 20px; font-family: var(--font-family); display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { border-radius: 12px; overflow: hidden; width: 120px; }
  .color { height: 64px; border: 1px solid var(--border); }
  .info { background: var(--surface-raised); padding: 8px 10px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .hex  { font-size: 10px; color: var(--text-muted); font-family: monospace; }
</style>
</head><body>
<div class="swatch"><div class="color" style="background:#100D1A"></div><div class="info"><div class="name">Background</div><div class="hex">#100D1A</div></div></div>
<div class="swatch"><div class="color" style="background:#171321"></div><div class="info"><div class="name">Surface</div><div class="hex">#171321</div></div></div>
<div class="swatch"><div class="color" style="background:#1D1828"></div><div class="info"><div class="name">SurfaceRaised</div><div class="hex">#1D1828</div></div></div>
<div class="swatch"><div class="color" style="background:#251F33"></div><div class="info"><div class="name">SurfaceStrong</div><div class="hex">#251F33</div></div></div>
<div class="swatch"><div class="color" style="background:#161125"></div><div class="info"><div class="name">TopBar</div><div class="hex">#161125</div></div></div>
<div class="swatch"><div class="color" style="background:#342D46"></div><div class="info"><div class="name">SurfaceBorder</div><div class="hex">#342D46</div></div></div>
<div class="swatch"><div class="color" style="background:#2A2437"></div><div class="info"><div class="name">BorderSubtle</div><div class="hex">#2A2437</div></div></div>
<div class="swatch"><div class="color" style="background:linear-gradient(160deg,#1D1828,#171321)"></div><div class="info"><div class="name">GradientCard</div><div class="hex">Raised→Surface</div></div></div>
</body></html>
