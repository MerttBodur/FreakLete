<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 20px; font-family: var(--font-family); display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .bar { background: var(--accent); height: 16px; border-radius: 4px; flex-shrink: 0; }
  .label { font-size: 12px; font-weight: 600; color: var(--text-primary); width: 40px; }
  .desc  { font-size: 11px; color: var(--text-muted); }
</style>
</head><body>
<div class="row"><div class="label">sp-1</div><div class="bar" style="width:4px"></div><div class="desc">4px — hairline gap</div></div>
<div class="row"><div class="label">sp-2</div><div class="bar" style="width:8px"></div><div class="desc">8px — in-card tight stack</div></div>
<div class="row"><div class="label">sp-3</div><div class="bar" style="width:12px"></div><div class="desc">12px — in-card stack</div></div>
<div class="row"><div class="label">sp-4</div><div class="bar" style="width:16px"></div><div class="desc">16px — standard gap</div></div>
<div class="row"><div class="label">sp-5</div><div class="bar" style="width:18px"></div><div class="desc">18px — section spacing / card padding</div></div>
<div class="row"><div class="label">sp-6</div><div class="bar" style="width:20px"></div><div class="desc">20px — outer page gutter</div></div>
<div class="row"><div class="label">sp-7</div><div class="bar" style="width:24px"></div><div class="desc">24px — section header spacing</div></div>
<div class="row"><div class="label">sp-8</div><div class="bar" style="width:32px"></div><div class="desc">32px — major section break</div></div>
</body></html>
