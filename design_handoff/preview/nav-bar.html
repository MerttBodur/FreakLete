<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 40px 24px; font-family: var(--font-family); display: flex; flex-direction: column; gap: 24px; align-items: center; }
  .nav { background: var(--surface); border: 1px solid var(--border); border-radius: 26px; box-shadow: 0 4px 20px rgba(0,0,0,0.35); padding: 10px 16px; display: flex; gap: 0; width: 320px; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 6px; cursor: pointer; border-radius: 18px; }
  .tab.active { background: var(--accent-soft); }
  .icon { width: 22px; height: 22px; }
  .tab-label { font-size: 10px; font-weight: 600; color: var(--text-muted); }
  .tab.active .tab-label { color: var(--accent-glow); }
  .tab.active .icon path, .tab.active .icon line, .tab.active .icon rect, .tab.active .icon circle, .tab.active .icon polyline, .tab.active .icon polygon { stroke: var(--accent-glow); }
  svg { width: 22px; height: 22px; }
</style>
</head><body>
<div class="nav">
  <div class="tab active">
    <svg viewBox="0 0 24 24" fill="none" stroke="#A78BFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    <span class="tab-label" style="color:var(--accent-glow)">Home</span>
  </div>
  <div class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8A889B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11"/><rect x="2" y="5" width="3" height="14" rx="1"/><rect x="19" y="5" width="3" height="14" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span class="tab-label">Workout</span>
  </div>
  <div class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8A889B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="14" y2="14"/></svg>
    <span class="tab-label">Calc</span>
  </div>
  <div class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8A889B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><line x1="3" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="21" y2="12"/></svg>
    <span class="tab-label">Programs</span>
  </div>
  <div class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="#8A889B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span class="tab-label">Profile</span>
  </div>
</div>
</body></html>
