<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 24px 20px; font-family: var(--font-family); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .label { font-size: 11px; color: var(--text-muted); width: 90px; font-weight: 600; }
  button { font-family: var(--font-family); cursor: pointer; border: none; }
  .btn-primary { background: var(--accent); color: var(--text-primary); font-size: 15px; font-weight: 600; border-radius: 18px; padding: 13px 24px; min-height: 44px; }
  .btn-secondary { background: var(--surface-strong); color: var(--text-primary); font-size: 15px; font-weight: 600; border-radius: 18px; padding: 13px 24px; min-height: 44px; border: 1px solid var(--border); }
  .btn-danger { background: var(--danger-soft); color: var(--danger); font-size: 15px; font-weight: 600; border-radius: 18px; padding: 13px 24px; min-height: 44px; border: 1px solid var(--danger); }
  .btn-sm { padding: 9px 16px; font-size: 13px; border-radius: 14px; min-height: 36px; }
  .btn-disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head><body>
<div class="row"><div class="label">Primary</div><button class="btn-primary">Start Workout</button><button class="btn-primary btn-sm">Add Set</button></div>
<div class="row"><div class="label">Secondary</div><button class="btn-secondary">Browse Templates</button><button class="btn-secondary btn-sm">Cancel</button></div>
<div class="row"><div class="label">Destructive</div><button class="btn-danger">Delete Account</button></div>
<div class="row"><div class="label">Disabled</div><button class="btn-primary btn-disabled" disabled>Calculate</button><button class="btn-secondary btn-disabled" disabled>Save</button></div>
</body></html>
