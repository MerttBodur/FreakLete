<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 24px 20px; font-family: var(--font-family); display: flex; gap: 16px; flex-direction: column; }
  .row { display: flex; align-items: center; gap: 14px; }
  .dot { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
  .label { font-size: 15px; font-weight: 600; }
  .meta { font-size: 11px; color: var(--text-muted); font-family: monospace; }
</style>
</head><body>
<div class="row"><div class="dot" style="background:#F7F7FB"></div><div><div class="label" style="color:#F7F7FB">TextPrimary — #F7F7FB</div><div class="meta">Headings, labels, values</div></div></div>
<div class="row"><div class="dot" style="background:#B3B2C5"></div><div><div class="label" style="color:#B3B2C5">TextSecondary — #B3B2C5</div><div class="meta">Descriptions, helper text</div></div></div>
<div class="row"><div class="dot" style="background:#8A889B"></div><div><div class="label" style="color:#8A889B">TextMuted — #8A889B</div><div class="meta">Metadata, captions, placeholders</div></div></div>
<div class="row"><div class="dot" style="background:#A78BFA"></div><div><div class="label" style="color:#A78BFA">AccentGlow — #A78BFA</div><div class="meta">Highlighted numbers, active labels</div></div></div>
</body></html>
