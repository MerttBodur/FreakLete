<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 20px; font-family: var(--font-family); display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
  .swatch { border-radius: 12px; overflow: hidden; width: 120px; }
  .color { height: 64px; }
  .info { background: var(--surface); padding: 8px 10px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-primary); }
  .hex  { font-size: 10px; color: var(--text-muted); font-family: monospace; }
</style>
</head><body>
<div class="swatch"><div class="color" style="background:#8B5CF6"></div><div class="info"><div class="name">Accent</div><div class="hex">#8B5CF6</div></div></div>
<div class="swatch"><div class="color" style="background:#A78BFA"></div><div class="info"><div class="name">AccentGlow</div><div class="hex">#A78BFA</div></div></div>
<div class="swatch"><div class="color" style="background:#2F2346"></div><div class="info"><div class="name">AccentSoft</div><div class="hex">#2F2346</div></div></div>
<div class="swatch"><div class="color" style="background:#3D2F5A"></div><div class="info"><div class="name">AccentSubtle</div><div class="hex">#3D2F5A</div></div></div>
<div class="swatch"><div class="color" style="background:linear-gradient(160deg,#2F2346,#171321)"></div><div class="info"><div class="name">GradientAccent</div><div class="hex">AccentSoft→Surface</div></div></div>
</body></html>
