<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 20px 24px; font-family: var(--font-family); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 12px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px; }
  .sample { flex: 1; }
  .meta { font-size: 10px; color: var(--text-muted); font-family: monospace; white-space: nowrap; width: 130px; text-align: right; }
</style>
</head><body>
<div class="row"><div class="sample" style="font-size:34px;font-weight:600;color:#F7F7FB;line-height:1">Headline</div><div class="meta">34px · Semibold</div></div>
<div class="row"><div class="sample" style="font-size:24px;font-weight:600;color:#F7F7FB">Subheadline</div><div class="meta">24px · Semibold</div></div>
<div class="row"><div class="sample" style="font-size:21px;font-weight:600;color:#F7F7FB">Header Title</div><div class="meta">21px · Semibold</div></div>
<div class="row"><div class="sample" style="font-size:18px;font-weight:600;color:#F7F7FB">Card Title</div><div class="meta">18px · Semibold</div></div>
<div class="row"><div class="sample" style="font-size:15px;font-weight:600;color:#F7F7FB">Standard Label</div><div class="meta">15px · Semibold</div></div>
<div class="row"><div class="sample" style="font-size:14px;font-weight:400;color:#B3B2C5">Body Muted — helper and supporting text</div><div class="meta">14px · Regular</div></div>
<div class="row"><div class="sample" style="font-size:12px;font-weight:600;color:#8A889B;text-transform:uppercase;letter-spacing:0.08em">EYEBROW LABEL</div><div class="meta">12px · Semibold · Caps</div></div>
<div class="row"><div class="sample" style="font-size:11px;font-weight:400;color:#8A889B">Caption / metadata text</div><div class="meta">11px · Regular</div></div>
<div class="row"><div class="sample" style="font-size:10px;font-weight:600;color:#8A889B">Nav Label</div><div class="meta">10px · Semibold</div></div>
</body></html>
