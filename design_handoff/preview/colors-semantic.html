<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--background); margin: 0; padding: 20px; font-family: var(--font-family); display: flex; gap: 10px; flex-wrap: wrap; }
  .pill { border-radius: 20px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .name { font-size: 13px; font-weight: 600; }
  .hex  { font-size: 10px; font-family: monospace; opacity: 0.7; }
</style>
</head><body>
<div class="pill" style="background:#0D2818"><div class="dot" style="background:#22C55E"></div><div><div class="name" style="color:#22C55E">Success</div><div class="hex" style="color:#22C55E">#22C55E</div></div></div>
<div class="pill" style="background:#2A1F06"><div class="dot" style="background:#F59E0B"></div><div><div class="name" style="color:#F59E0B">Warning</div><div class="hex" style="color:#F59E0B">#F59E0B</div></div></div>
<div class="pill" style="background:#3A1623"><div class="dot" style="background:#DC2626"></div><div><div class="name" style="color:#DC2626">Danger</div><div class="hex" style="color:#DC2626">#DC2626</div></div></div>
<div class="pill" style="background:#3A1623"><div class="dot" style="background:#EF4444"></div><div><div class="name" style="color:#EF4444">Error</div><div class="hex" style="color:#EF4444">#EF4444</div></div></div>
<div class="pill" style="background:#0D1B2A"><div class="dot" style="background:#3B82F6"></div><div><div class="name" style="color:#3B82F6">Info</div><div class="hex" style="color:#3B82F6">#3B82F6</div></div></div>
</body></html>
